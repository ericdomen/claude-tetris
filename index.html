<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section theme-toggle-section">
          <span class="label">MODO CLARO</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="theme-switch-slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="name-entry hidden">
          <label class="label" for="player-name">¡Nuevo récord!</label>
          <input type="text" id="player-name" maxlength="12" placeholder="Nombre" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div class="scoreboard">
          <span class="label">RÉCORDS</span>
          <table id="overlay-scoreboard-table" class="scoreboard-table"></table>
          <div class="scoreboard-stats">
            <span>Mejor combo: <strong id="overlay-best-combo">0</strong></span>
            <span>Líneas máximas: <strong id="overlay-max-lines">0</strong></span>
          </div>
          <button id="overlay-reset-scores-btn" class="reset-scores-btn">Borrar récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p id="start-title" class="start-title">TETRIS</p>

        <div class="scoreboard">
          <span class="label">RÉCORDS</span>
          <table id="start-scoreboard-table" class="scoreboard-table"></table>
          <div class="scoreboard-stats">
            <span>Mejor combo: <strong id="start-best-combo">0</strong></span>
            <span>Líneas máximas: <strong id="start-max-lines">0</strong></span>
          </div>
          <button id="start-reset-scores-btn" class="reset-scores-btn">Borrar récords</button>
        </div>

        <button id="play-btn">Jugar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
