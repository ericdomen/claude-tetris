<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section theme-toggle-section">
          <span class="label">MODO CLARO</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="theme-switch-slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay">
      <div class="overlay-box">
        <p id="overlay-title">TETRIS</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="hidden">
          <p class="highscore-prompt">¡Nuevo puntaje alto! Ingresa tu nombre:</p>
          <input id="name-input" type="text" maxlength="12" placeholder="Nombre" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div id="highscores-section">
          <p class="label">TOP 5</p>
          <table id="highscores-table">
            <tbody id="highscores-body"></tbody>
          </table>
          <div class="stats-row">
            <div class="panel-section">
              <span class="label">MEJOR COMBO</span>
              <span class="value" id="best-combo">0</span>
            </div>
            <div class="panel-section">
              <span class="label">MAX LÍNEAS</span>
              <span class="value" id="max-lines-clear">0</span>
            </div>
          </div>
          <button id="reset-records-btn">Resetear records</button>
        </div>

        <button id="start-btn" class="hidden">Jugar</button>
        <button id="restart-btn" class="hidden">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
